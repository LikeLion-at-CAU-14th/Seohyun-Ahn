<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Props</title>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script> <!-- 리액트 CDN 다운 -> 노션페이지 링크 들어가서 복붙-->
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  
  <script type="text/babel" src="./counter.js"></script> <!--불러오기-->

  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script> <!--바벨 다운 복붙-->

  <script type="text/babel">
    const 정건 = ReactDOM.createRoot(document.getElementById('root')) //정건은 변수명
    정건.render(
      <>
      <카운터/>

      </> //최종하나의 부모로 감싸야 함->시맨틱태그나 div 사용
    ) // JSX에서 return (<>hi world</>) 랑 같음, 정건.render(<div>hi world</div>)이렇게 썼더니 연산자로 인식해 오류남-> 바벨 다운로드 필요, 바벨 사이트에 나온 스크립트 타입 복붙 적기
  </script> <!--스크립트 태그 안에는 자바스크립트 언어 사용-->
</head>
<body>
  <div id="root"></div> <!--최종 껍질만 적음-->
</body>
</html>

<!--페이지에서 일반변수 올리기 버튼 눌러보면 개발자창 콘솔에 뜸, useState는 화면에 카운트 증가함 -->
