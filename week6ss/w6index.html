<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <link rel="stylesheet" href="./w6style.css" /> <!--오류나면 파일명 맞는지 확인하기-->
</head>
<body>
    <main>
        <section id="to-do-list">
            <div class="title to-do">
                <div>To-Do List</div>
                <div id="input-box">
                    <input type="text" placeholder="새로운 할 일!" aria-label="새로운 할 일 입력" />
                    <button id="input">추가</button>
                </div>
            </div>
        </section>
        <section id="complete-list">
            <div class="title complete">Complete List</div>
        </section>
    </main>
</body>
<script type="module" src="./app.js"></script>
</html>
